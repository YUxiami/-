        /* 专为汉字学习设计的清晰标准字体 */
        .hanzi-font {
            font-family: 'Kaiti', 'STKaiti', '楷体', 'KaiTi_GB2312', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        
        .correct-answer { background-color: #22c55e !important; color: white !important; border-color: #16a34a !important; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4) !important;}

        function playAudio(text, isProcedural = false) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                // 如果是手工精选关卡，isProcedural 为 false，这里直接读组词 (text 传入即为 word)
                // 如果是自动生成的没有组词的关卡，它会提示“请找出汉字：X”
                const speechText = isProcedural ? `请找出汉字：${text}` : text;
                const utterance = new SpeechSynthesisUtterance(speechText);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- 渲染路由 ---
        function render() {
            appEl.innerHTML = '';
            if (state.currentScreen === 'home') renderHome();
            else if (state.currentScreen === 'modeSelect') renderModeSelect();
            else if (state.currentScreen === 'quiz') renderQuiz();
            else if (state.currentScreen === 'result') renderResult();
        }

        // 1. 首页地图
        function renderHome() {
            const header = `
                <div class="bg-blue-500 text-white p-6 sm:rounded-t-3xl shadow-md text-center flex-shrink-0 z-10 relative">
                    <h1 class="text-3xl font-bold title-font tracking-widest text-shadow-sm">汉字大闯关</h1>
                    <p class="text-blue-100 mt-2 text-sm font-medium opacity-90">3500常用字 • 识字量训练</p>
                </div>
            `;

            let levelsHtml = '<div class="flex-1 overflow-y-auto p-4 bg-slate-50"><div class="grid grid-cols-4 sm:grid-cols-5 gap-3 pb-6">';
            
            quizDatabase.forEach(level => {
                const isManual = !level.isProcedural; 
                const bgColor = isManual ? 'bg-gradient-to-br from-orange-400 to-red-400 border border-orange-300 text-white' : 'bg-white border border-slate-200 text-slate-500';
                
                levelsHtml += `
                    <div onclick="selectLevel(${level.id})" 
                         class="aspect-square rounded-2xl flex flex-col items-center justify-center transition-all duration-200 cursor-pointer shadow-sm hover:shadow-md hover:scale-105 active:scale-95 ${bgColor}">
                        <span class="text-2xl font-bold title-font">${level.id}</span>
                        ${isManual ? '<span class="text-[10px] opacity-80 mt-1">精编版</span>' : ''}
                    </div>
                `;
            });
            levelsHtml += '</div></div>';

            appEl.innerHTML = header + levelsHtml;
        }

        // 2. 模式选择
        function renderModeSelect() {
            const levelData = quizDatabase.find(l => l.id === state.selectedLevelId);
            const isAuto = levelData.isProcedural;
            
            const html = `
                <div class="flex flex-col h-full bg-slate-50">
                    <div class="p-4 flex items-center shadow-sm bg-white shrink-0">
                        <button onclick="goHome()" class="text-slate-500 flex items-center hover:text-blue-500 font-bold transition">
                            <svg class="w-6 h-6 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            返回
                        </button>
                    </div>
                    
                    <div class="flex-1 p-6 flex flex-col justify-center">
                        <div class="text-center mb-10">
                            <h2 class="text-4xl font-bold title-font text-blue-600 mb-2 drop-shadow-sm">第 ${levelData.id} 关</h2>
                            <p class="text-xl text-slate-500 font-bold tracking-widest">${levelData.title}</p>
                            ${isAuto ? '<span class="inline-block mt-3 bg-yellow-100 text-yellow-700 text-xs px-3 py-1 rounded-full border border-yellow-200">正在使用自动生成题库（因为未检测到手工数据）</span>' : ''}
                        </div>

                        <div class="space-y-5 px-2">
                            <button onclick="startQuiz('charToPinyin')" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white rounded-3xl p-6 shadow-md transform transition active:scale-95 flex flex-col items-center border-b-4 border-indigo-700">
                                <span class="text-3xl mb-2">👀</span>
                                <span class="text-2xl font-bold title-font">看汉字 选拼音</span>
                                <span class="text-indigo-200 text-sm mt-2">${isAuto ? '⚠️ 拼音需要人工标定，暂未开放' : '训练：视觉输入 -> 语音解码'}</span>
                            </button>

                            <button onclick="startQuiz('audioToChar')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white rounded-3xl p-6 shadow-md transform transition active:scale-95 flex flex-col items-center border-b-4 border-emerald-700 relative overflow-hidden">
                                ${isAuto ? '' : '<div class="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-xs font-bold px-4 py-1 rounded-bl-lg transform rotate-0">形近/音近区辨</div>'}
                                <span class="text-3xl mb-2">👂</span>
                                <span class="text-2xl font-bold title-font">听读音 选汉字</span>
                                <span class="text-emerald-200 text-sm mt-2">训练：听觉输入 -> 语义视觉辨别</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            appEl.innerHTML = html;
        }

        // 3. 核心答题页
        function renderQuiz() {
            const levelData = quizDatabase.find(l => l.id === state.selectedLevelId);
            const isAuto = levelData.isProcedural; // 这里判断该关是否为自动生成
            
            const currentQ = state.questions[state.currentQuestionIndex];
            const progress = ((state.currentQuestionIndex) / state.questions.length) * 100;
            
            let questionAreaHtml = '';
            let options = [];

            if (state.selectedMode === 'charToPinyin') {
                questionAreaHtml = `
                    <div class="flex-1 flex flex-col items-center justify-center bg-white rounded-3xl mx-4 mt-4 shadow-sm border border-slate-100">
                        <div class="text-9xl font-bold text-slate-800 hanzi-font animate-pop select-none drop-shadow-md relative">
                            ${currentQ.char}
                            ${currentQ.isDuplicate ? '<span class="absolute -top-2 -right-8 text-sm bg-rose-500 text-white px-3 py-1 rounded-full shadow-md tracking-normal font-sans border-2 border-white">重字</span>' : ''}
                        </div>
                    </div>
                `;
                options = safeShuffle([currentQ.pinyin, ...currentQ.pinyinDistractors]);
            } else {
                questionAreaHtml = `
                    <div class="flex-1 flex flex-col items-center justify-center bg-white rounded-3xl mx-4 mt-4 shadow-sm border border-slate-100">
                        <button onclick="playAudio('${currentQ.word}', ${isAuto})" class="w-32 h-32 bg-blue-50 rounded-full flex items-center justify-center hover:bg-blue-100 active:scale-90 transition-transform shadow-inner border-4 border-blue-100">
                            <svg class="w-16 h-16 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z"></path>
                            </svg>
                        </button>
                        <p class="text-slate-400 mt-6 font-bold tracking-widest text-sm">点击喇叭听语音</p>
                    </div>
                `;
                options = safeShuffle([currentQ.char, ...currentQ.charDistractors]);
                
                if(!state.isAnswering) {
                    setTimeout(() => playAudio(currentQ.word, isAuto), 300);
                }
            }

            const optionsHtml = options.map((opt) => {
                // 如果是听音选字模式，并且选项是题库里重复的字，就在选项右上角加个标记
                const isDupeOpt = (state.selectedMode === 'audioToChar' && charCounts[opt] > 1);
                return `
                <button onclick="handleAnswer('${opt}', this)" 
                        class="option-btn relative bg-white border-2 border-slate-200 rounded-2xl p-5 text-4xl font-bold text-slate-700 shadow-sm hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95 ${state.selectedMode === 'charToPinyin' ? 'tracking-widest font-sans' : 'hanzi-font'}">
                    ${opt}
                    ${isDupeOpt ? '<span class="absolute -top-3 -right-2 font-sans text-xs bg-rose-500 text-white px-2 py-0.5 rounded-full border-2 border-white shadow-sm">重字</span>' : ''}
                </button>
                `;
            }).join('');

            const html = `
                <div class="h-full flex flex-col bg-slate-50">
                    <div class="p-4 flex items-center justify-between border-b border-slate-200 bg-white shrink-0">
                        <button onclick="abandonQuiz()" class="text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-100 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                        <div class="w-1/2 h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner border border-slate-200">
                            <div class="h-full bg-gradient-to-r from-green-400 to-emerald-500 transition-all duration-300" style="width: ${progress}%"></div>
                        </div>
                        <div class="font-bold text-slate-500 text-sm tracking-widest">${state.currentQuestionIndex + 1} / ${state.questions.length}</div>
                    </div>

                    ${questionAreaHtml}

                    <div class="p-6 grid grid-cols-2 gap-4 shrink-0 pb-10">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            appEl.innerHTML = html;
        }

        // 4. 结算页
        function renderResult() {
            const total = state.questions.length;
            const score = state.score;
            const percentage = Math.round((score / total) * 100);
            
            let feedback = ""; let emoji = "";
            if(percentage === 100) { feedback = "太棒了！完美通关！"; emoji = "🌟"; }
            else if(percentage >= 80) { feedback = "非常不错！继续努力！"; emoji = "👍"; }
            else { feedback = "多加练习，你会更棒的！"; emoji = "💪"; }

            const html = `
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center animate-pop bg-slate-50">
                    <div class="text-8xl mb-6 drop-shadow-md">${emoji}</div>
                    <h2 class="text-4xl font-bold title-font text-blue-600 mb-2">${feedback}</h2>
                    <p class="text-xl font-bold text-slate-500 mb-10 tracking-widest">本次得分：<span class="text-orange-500 text-5xl mx-2">${score}</span> / ${total}</p>
                    
                    <div class="space-y-4 w-full max-w-sm px-4">
                        <button onclick="renderModeSelect()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-full shadow-lg transition active:scale-95 text-lg tracking-widest border-b-4 border-blue-700">
                            再玩一次
                        </button>
                        <button onclick="goHome()" class="w-full bg-white hover:bg-slate-100 text-slate-600 font-bold py-4 rounded-full shadow transition active:scale-95 text-lg tracking-widest border border-slate-200">
                            返回地图
                        </button>
                    </div>
                </div>
            `;
            appEl.innerHTML = html;
        }

        // --- 控制逻辑 ---
        function selectLevel(id) {
            state.selectedLevelId = id;
            state.currentScreen = 'modeSelect';
            render();
        }

        function goHome() {
            state.currentScreen = 'home';
            render();
        }

        function abandonQuiz() {
            if(confirm("确定要退出当前练习吗？进度将会丢失哦。")) renderModeSelect();
        }

        function startQuiz(mode) {
            const levelData = quizDatabase.find(l => l.id === state.selectedLevelId);
            const isProceduralLevel = levelData.isProcedural;

            if (mode === 'charToPinyin' && isProceduralLevel) {
                alert("提示：第12关至第88关还未粘贴手工数据哦。暂不支持此模式！\n\n已自动为您降级并切换至【听读音选汉字】模式！");
                mode = 'audioToChar';
            }

            // 【核心修复】：每次进入关卡重新深拷贝并彻底洗牌打乱题目顺序
            state.questions = safeShuffle([...levelData.characters]);
            
            state.selectedMode = mode;
            state.currentQuestionIndex = 0;
            state.score = 0;
            state.isAnswering = false;
            state.currentScreen = 'quiz';
            render();
        }

        function handleAnswer(selectedOption, btnElement) {
            if (state.isAnswering) return; 
            state.isAnswering = true;

            const currentQ = state.questions[state.currentQuestionIndex];
            const isPinyinMode = state.selectedMode === 'charToPinyin';
            const correctAnswer = isPinyinMode ? currentQ.pinyin : currentQ.char;
            
            const isCorrect = selectedOption === correctAnswer;

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (isCorrect) {
                btnElement.classList.add('correct-answer', 'animate-pop');
                state.score++;
                if(!isPinyinMode) playAudio("答对了", false); 
            } else {
                btnElement.classList.add('wrong-answer', 'animate-shake');
                if(!isPinyinMode) playAudio("不对哦，再想一想", false);
                
                allBtns.forEach(b => {
                    // 当回答错误时，高亮真正的正确答案（去掉重字标记文本的干扰）
                    const btnText = b.innerText.replace('重字', '').trim();
                    if(btnText === correctAnswer) {
                        b.classList.add('correct-answer');
                        b.classList.remove('bg-white');
                    }
                });
            }

            setTimeout(() => {
                state.currentQuestionIndex++;
                state.isAnswering = false;
                
                if (state.currentQuestionIndex >= state.questions.length) {
                    state.currentScreen = 'result';
                }
                render();
            }, 1500); 
        }

        // 初始化
        render();
    </script>
</body>
</html>
